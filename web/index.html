<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Base href is replaced by Flutter at build time.
    Build command: flutter build web --release --base-href /
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO & Description -->
  <meta name="description"
        content="QuickBite — Scan the QR at your table, browse the menu and order instantly. No app download needed.">
  <meta name="keywords"
        content="restaurant, qr ordering, table ordering, quickbite, food, menu">
  <meta name="author" content="QuickBite">
  <meta name="theme-color" content="#D4A853">

  <!-- Open Graph (WhatsApp / social previews) -->
  <meta property="og:title"       content="QuickBite — Scan & Order">
  <meta property="og:description" content="Browse the menu and order food right from your table. Powered by QuickBite.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="icons/Icon-512.png">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable"         content="yes">
  <meta name="apple-mobile-web-app-capable"   content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title"     content="QuickBite">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>QuickBite — Scan &amp; Order</title>

  <style>
    /* Prevent flash of white background while Flutter loads */
    body {
      background-color: #1A1A1A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
